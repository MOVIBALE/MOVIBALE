<?xml version="1.0" encoding="UTF-8"?>
<svg width="860" height="180" viewBox="0 0 860 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="52%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#FF2E88" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    .card { fill: #0D1117; stroke: url(#accent); stroke-width: 1.2; }
    .eyebrow { font: 700 11px 'Segoe UI', Ubuntu, Sans-Serif; letter-spacing: .08em; fill: #00F5FF; }
    .title { font: 800 24px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }
    .smallTitle { font: 800 21px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }
    .text { font: 500 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C9D1D9; }
    .muted { font: 500 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8B949E; }
    .label { font: 700 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C9D1D9; }
    .value { font: 800 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }
    .big { font: 900 45px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }
    .chipText { font: 700 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }
  </style>

  <rect x="1" y="1" width="858" height="178" rx="18" class="card" />
  <circle cx="798" cy="38" r="36" fill="url(#accent)" opacity=".18" filter="url(#softGlow)" />
  <text x="28" y="32" class="eyebrow">FLAGSHIP PROJECT</text>
  <text x="28" y="66" class="title">lumina-layer-studio/Lumina-Layers</text>
  <text x="28" y="95" class="text">A physics-based multi-material FDM color system. Converts images to full-color 3D</text>
  <text x="28" y="114" class="text">prints via calibrated light-transmission mixing. Supports 2-8 color systems with</text>
  <circle cx="32" cy="144" r="6" fill="#3776AB" />
  <text x="48" y="149" class="chipText">Python</text>
  <text x="156" y="149" class="chipText">Stars 897</text>
  <text x="250" y="149" class="chipText">Forks 138</text>
  <text x="830" y="149" class="muted" text-anchor="end">lumina-layer-studio</text>
</svg>
