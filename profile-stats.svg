<?xml version="1.0" encoding="UTF-8"?>
<svg width="420" height="180" viewBox="0 0 420 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="52%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#FF2E88" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    .card { fill: #0D1117; stroke: url(#accent); stroke-width: 1.2; }
    .eyebrow { font: 700 11px 'Segoe UI', Ubuntu, Sans-Serif; letter-spacing: .08em; fill: #00F5FF; }
    .title { font: 800 24px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }
    .smallTitle { font: 800 21px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }
    .text { font: 500 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C9D1D9; }
    .muted { font: 500 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8B949E; }
    .label { font: 700 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C9D1D9; }
    .value { font: 800 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }
    .big { font: 900 45px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }
    .chipText { font: 700 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }
  </style>

  <rect x="1" y="1" width="418" height="178" rx="18" class="card" />
  <text x="28" y="33" class="smallTitle">MOVIBALE Stats</text>
  <text x="28" y="53" class="muted">Including Lumina-Layers</text>
  <text x="28" y="75" class="label">Total stars</text>
  <text x="205" y="75" class="value" text-anchor="end">900</text>
  <circle cx="15" cy="70" r="5" stroke="url(#accent)" stroke-width="2" />
  <text x="28" y="96" class="label">MOVIBALE repos</text>
  <text x="205" y="96" class="value" text-anchor="end">3</text>
  <circle cx="15" cy="91" r="5" stroke="url(#accent)" stroke-width="2" />
  <text x="28" y="117" class="label">Lumina stars</text>
  <text x="205" y="117" class="value" text-anchor="end">897</text>
  <circle cx="15" cy="112" r="5" stroke="url(#accent)" stroke-width="2" />
  <text x="28" y="138" class="label">Lumina forks</text>
  <text x="205" y="138" class="value" text-anchor="end">138</text>
  <circle cx="15" cy="133" r="5" stroke="url(#accent)" stroke-width="2" />
  <text x="28" y="159" class="label">Public repos</text>
  <text x="205" y="159" class="value" text-anchor="end">8</text>
  <circle cx="15" cy="154" r="5" stroke="url(#accent)" stroke-width="2" />
  <rect x="245" y="52" width="148" height="96" rx="20" fill="#161B22" stroke="url(#accent)" stroke-width="1.2" />
  <text x="319" y="88" class="big" text-anchor="middle" dominant-baseline="middle">900</text>
  <text x="319" y="124" class="eyebrow" text-anchor="middle">TOTAL STARS</text>
  <text x="319" y="160" class="muted" text-anchor="middle">Updated 2026-07-01</text>
</svg>
